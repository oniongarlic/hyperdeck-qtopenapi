          enum:
          - Peak
          - ColoredLines
          example: Peak
        color:
          type: string
          description: Color of the focus assist highlight.
          enum:
          - Red
          - Green
          - Blue
          - White
          - Black
          example: Red
        intensity:
          type: integer
          description: Intensity of the focus assist highlight (0-100).
          example: 75
    RatioState:
      type: object
      properties:
