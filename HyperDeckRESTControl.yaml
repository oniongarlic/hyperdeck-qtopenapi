  parameters:
    DeviceNameParameter:
      in: path
      name: deviceName
      schema:
        type: string
        example: sd1
      required: true
      description: Device name of the media device. Retrieved by "deviceName" member of GET /media/workingset or GET /media/active.
    displayName:
      in: path
      name: displayName
      required: true
      description: Name of the display. Obtainable from /monitoring/display which returns a list of displayNames.
      schema:
        type: string
    URLParameter:
      in: path
      name: url
      schema:
        type: string
      required: true
      description: URL of network share, as returned by GET /media/nas/bookmarks. Slashes in url should be encoded as %2F
      example: smb:%2F%2FBlackmagic-Cloud-Store.local%2FShare%2Ffolder
